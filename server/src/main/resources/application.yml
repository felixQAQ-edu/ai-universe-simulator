spring:
  application:
    name: ai-universe-simulator-server

server:
  port: 8080

# ── 平台探针(ADR-015 Slice 3):actuator 只开 health,其余一律不暴露 ──────────
# liveness  = GET /actuator/health/liveness (进程活着)
# readiness = GET /actuator/health/readiness(可接流量)
# 平台不分两组探针时用 GET /actuator/health 即可。
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

# ── 运行模型 provider 配置表(ADR-001 §5.1 的 Java 落地)──────────────────────
# 换 provider 只改这张表。真实 API key 永远只进环境变量(api-key-env 指向变量名),
# 绝不写进本文件 / 代码 / 提交(CONTEXT §三.2、ADR-002)。
#
# active 取值:
#   mock              → MockLlmClient,离线逐字 echo,不读 key、不发真实请求(默认 / 回退)
#   deepseek-v4-flash → OpenAiCompatLlmClient,调真实 DeepSeek(需 DEEPSEEK_API_KEY 环境变量)
# 切真实模型:把 active 改成 deepseek-v4-flash 并 export DEEPSEEK_API_KEY=<key> 后再启动。
aiuniverse:
  # ── 会话落盘(ADR-015 C3:每 saveId 一个 JSON,最小续局)────────────────────
  # 默认 ./data 本地友好;部署时用环境变量 AIUNIVERSE_SESSION_STORE_DIR 覆盖到
  # 持久卷挂载点(如 /data)。目录必须在 web 根之外(启动断言,违者拒启)。
  session:
    store-dir: ./data
  # ── 成本闸门四阈值(ADR-016;Felix 拍板,基于线上真实 usage + 52% 缓存命中率)────
  # 全部可 env 覆盖(如 AIUNIVERSE_QUOTA_DAILY_BUDGET_CNY),冒烟压低阈值 = 临时 env。
  # 日界线 = 北京时间;阈值哲学:假想敌是脚本刷不是真人玩,宽到真人永远撞不到。
  quota:
    daily-budget-cny: 6        # 全局日限额 CNY(真闸)
    monthly-budget-cny: 175    # 全局月顶 CNY(真闸)
    init-per-key-daily: 10     # 单 IP/设备日 init 局数(软闸)
    turns-per-key-daily: 300   # 单 IP/设备日回合数(软闸)
  llm:
    active: mock
    providers:
      deepseek-v4-flash:
        label: "DeepSeek V4-Flash(非思考)"
        base-url: https://api.deepseek.com
        model: deepseek-v4-flash
        api-key-env: DEEPSEEK_API_KEY
        thinking: false
        max-context: 1000000
        price:
          input-cache-miss: 1.0
          input-cache-hit: 0.02
          output: 2.0
