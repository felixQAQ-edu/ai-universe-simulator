spring:
  application:
    name: ai-universe-simulator-server

server:
  port: 8080

# ── 运行模型 provider 配置表(ADR-001 §5.1 的 Java 落地)──────────────────────
# 换 provider 只改这张表。真实 API key 永远只进环境变量(api-key-env 指向变量名),
# 绝不写进本文件 / 代码 / 提交(CONTEXT §三.2、ADR-002)。
# 骨架阶段 active=mock:不读任何 key、不发任何真实请求。
aiuniverse:
  llm:
    active: mock
    providers:
      deepseek-v4-flash:
        label: "DeepSeek V4-Flash(非思考)"
        base-url: https://api.deepseek.com
        model: deepseek-v4-flash
        api-key-env: DEEPSEEK_API_KEY
        thinking: false
        max-context: 1000000
        price:
          input-cache-miss: 1.0
          input-cache-hit: 0.02
          output: 2.0
